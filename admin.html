<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Roomer — Agent admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="./data.js"></script>
<script type="text/babel" src="./consumer.jsx"></script>
<script type="text/babel" src="./admin.jsx"></script>

<style>
  html, body { height: 100%; background: #F4EFE6; margin:0; }
  #root { height: 100vh; height: 100dvh; }

  /* Top utility bar */
  .util-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
    background: #1B1916; color: #E9E1D0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; font-size: 13px;
    border-bottom: 1px solid #000;
  }
  .util-bar a { color: #E9E1D0; text-decoration: none; opacity: 0.7; }
  .util-bar a:hover { opacity: 1; }
  .util-bar .saved { font-family: "JetBrains Mono", monospace; font-size: 11px; opacity: 0.6; letter-spacing: 0.08em; }
  .util-bar button {
    background: #B4593A; color: #FFF6EF; border: none; border-radius: 999px;
    padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .util-bar button.ghost { background: transparent; border: 1px solid #3A352D; color: #E9E1D0; }
  .util-bar .actions { display:flex; gap: 8px; align-items: center; }
  .admin-root { padding-top: 44px; height: 100%; box-sizing: border-box; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useRef } = React;

  const lsKey = (id) => `roomer.listing.${id}`;

  async function openListing(id, { setListing, setView, setSaveStatus, isInitialized }) {
    setSaveStatus("loading");
    try {
      const r = await fetch(`/api/listing/${id}`);
      if (r.ok) {
        const data = await r.json();
        try { localStorage.setItem(lsKey(id), JSON.stringify(data)); } catch(e) {}
        isInitialized.current = false;
        setListing(data);
        setView("property");
        setSaveStatus("saved");
        return;
      }
    } catch(e) {}
    // Fall back to localStorage
    try {
      const raw = localStorage.getItem(lsKey(id));
      if (raw) {
        isInitialized.current = false;
        setListing(JSON.parse(raw));
        setView("property");
        setSaveStatus("saved");
        return;
      }
    } catch(e) {}
    setSaveStatus("idle");
    alert("Could not load listing. Please check your connection and try again.");
  }

  async function saveListing(listing) {
    try { localStorage.setItem(lsKey(listing.id), JSON.stringify(listing)); } catch(e) {}
    const r = await fetch(`/api/listing/${listing.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(listing),
    });
    if (!r.ok) throw new Error(((await r.json().catch(()=>({}))).error) || `HTTP ${r.status}`);
  }

  function AdminRoot() {
    const [view, setView] = useState("listings");
    const [listing, setListing] = useState(null);
    const [saveStatus, setSaveStatus] = useState("idle");
    const [savedAt, setSavedAt] = useState(null);
    const saveTimer = useRef(null);
    const isInitialized = useRef(false);

    const handleOpenListing = (id) =>
      openListing(id, { setListing, setView, setSaveStatus, isInitialized });

    const handleBack = () => {
      clearTimeout(saveTimer.current);
      setView("listings");
      setListing(null);
      isInitialized.current = false;
      setSaveStatus("idle");
    };

    // Auto-save (debounced 1.5s) whenever the active listing changes
    useEffect(() => {
      if (!listing) return;
      if (!isInitialized.current) { isInitialized.current = true; return; }
      setSaveStatus("saving");
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(async () => {
        try {
          await saveListing(listing);
          setSavedAt(new Date());
          setSaveStatus("saved");
        } catch(e) {
          setSaveStatus("error");
          console.error("Save failed:", e);
        }
      }, 1500);
      return () => clearTimeout(saveTimer.current);
    }, [listing]);

    const statusLabel =
      saveStatus === "loading" ? "loading…" :
      saveStatus === "saving"  ? "saving…" :
      saveStatus === "error"   ? "⚠ save failed" :
      saveStatus === "saved" && savedAt
        ? "saved · " + savedAt.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})
        : "";

    return (
      <>
        <div className="util-bar">
          <div style={{display:"flex", alignItems:"center", gap:14}}>
            <span className="serif" style={{fontSize:16, color:"#FBF7EE"}}>Roomer</span>
            {listing && (
              <a href={`./index.html?id=${listing.id}`} target="_blank">↗ Preview</a>
            )}
          </div>
          <div className="actions">
            {listing && statusLabel && (
              <span className="saved" style={{color: saveStatus==="error" ? "#E8825A" : undefined}}>
                {statusLabel}
              </span>
            )}
          </div>
        </div>
        <div className="admin-root">
          <AdminApp
            view={view}
            setView={setView}
            listing={listing}
            setListing={setListing}
            onOpenListing={handleOpenListing}
            onBack={handleBack}
          />
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<AdminRoot/>);
</script>

</body>
</html>

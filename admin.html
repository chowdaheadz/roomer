<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Roomer — Agent admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="./data.js"></script>
<script type="text/babel" src="./consumer.jsx"></script>
<script type="text/babel" src="./admin.jsx"></script>

<style>
  html, body { height: 100%; background: #F4EFE6; margin:0; }
  #root { height: 100vh; height: 100dvh; }

  /* Top utility bar */
  .util-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
    background: #1B1916; color: #E9E1D0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; font-size: 13px;
    border-bottom: 1px solid #000;
  }
  .util-bar a { color: #E9E1D0; text-decoration: none; opacity: 0.7; }
  .util-bar a:hover { opacity: 1; }
  .util-bar .saved { font-family: "JetBrains Mono", monospace; font-size: 11px; opacity: 0.6; letter-spacing: 0.08em; }
  .util-bar button {
    background: #B4593A; color: #FFF6EF; border: none; border-radius: 999px;
    padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .util-bar button.ghost { background: transparent; border: 1px solid #3A352D; color: #E9E1D0; }
  .util-bar .actions { display:flex; gap: 8px; align-items: center; }
  .admin-root { padding-top: 44px; height: 100%; box-sizing: border-box; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useRef } = React;

  const STORAGE_KEY = "roomer.listing.v1";

  async function loadListing() {
    const id = window.LISTING?.id;
    if (id) {
      try {
        const r = await fetch(`/api/listing/${id}`);
        if (r.ok) {
          const data = await r.json();
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
          return data;
        }
      } catch(e) {}
    }
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return window.LISTING;
  }

  async function saveListing(listing) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(listing)); } catch(e) {}
    const r = await fetch(`/api/listing/${listing.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(listing),
    });
    if (!r.ok) {
      const { error } = await r.json().catch(() => ({}));
      throw new Error(error || `HTTP ${r.status}`);
    }
  }

  function resetToFile() {
    if (!confirm("Reset to the data.js shipped in the repo? Your cloud-saved edits will be lost.")) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  function AdminRoot() {
    const [listing, setListing] = useState(null);
    const [saveStatus, setSaveStatus] = useState("loading");
    const [savedAt, setSavedAt] = useState(null);
    const [saveError, setSaveError] = useState(null);
    const saveTimer = useRef(null);
    const isInitialized = useRef(false);

    useEffect(() => {
      loadListing().then(data => {
        setListing(data);
        setSaveStatus("saved");
      });
    }, []);

    // Auto-save to API (debounced 1.5s after each change)
    useEffect(() => {
      if (!listing) return;
      if (!isInitialized.current) { isInitialized.current = true; return; }
      setSaveStatus("saving");
      setSaveError(null);
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(async () => {
        try {
          await saveListing(listing);
          setSavedAt(new Date());
          setSaveStatus("saved");
        } catch(e) {
          setSaveStatus("error");
          setSaveError(e.message);
        }
      }, 1500);
      return () => clearTimeout(saveTimer.current);
    }, [listing]);

    if (!listing) {
      return (
        <div style={{display:"flex", alignItems:"center", justifyContent:"center",
          height:"100vh", color:"var(--muted)", fontSize:14}}>
          Loading…
        </div>
      );
    }

    const statusLabel =
      saveStatus === "loading" ? "loading…" :
      saveStatus === "saving"  ? "saving…" :
      saveStatus === "error"   ? ("⚠ " + (saveError || "save failed")) :
      savedAt ? ("saved · " + savedAt.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})) :
      "ready";

    return (
      <>
        <div className="util-bar">
          <div style={{display:"flex", alignItems:"center", gap:14}}>
            <span className="serif" style={{fontSize:16, color:"#FBF7EE"}}>Roomer admin</span>
            <a href="./index.html" target="_blank">↗ Preview consumer view</a>
          </div>
          <div className="actions">
            <span className="saved" style={{color: saveStatus === "error" ? "#E8825A" : undefined}}
              title={saveStatus === "error" ? saveError : undefined}>
              {statusLabel}
            </span>
            <button className="ghost" onClick={resetToFile}>Reset</button>
          </div>
        </div>
        <div className="admin-root">
          <AdminApp listing={listing} setListing={setListing}/>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<AdminRoot/>);
</script>

</body>
</html>

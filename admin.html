<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Roomer — Agent admin</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="./data.js"></script>
<script type="text/babel" src="./consumer.jsx"></script>
<script type="text/babel" src="./admin.jsx"></script>

<style>
  html, body { height: 100%; background: #F4EFE6; margin:0; }
  #root { height: 100vh; height: 100dvh; }

  /* Top utility bar */
  .util-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
    background: #1B1916; color: #E9E1D0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; font-size: 13px;
    border-bottom: 1px solid #000;
  }
  .util-bar a { color: #E9E1D0; text-decoration: none; opacity: 0.7; }
  .util-bar a:hover { opacity: 1; }
  .util-bar .saved { font-family: "JetBrains Mono", monospace; font-size: 11px; opacity: 0.6; letter-spacing: 0.08em; }
  .util-bar button {
    background: #B4593A; color: #FFF6EF; border: none; border-radius: 999px;
    padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer;
  }
  .util-bar button.ghost { background: transparent; border: 1px solid #3A352D; color: #E9E1D0; }
  .util-bar .actions { display:flex; gap: 8px; align-items: center; }
  .admin-root { padding-top: 44px; height: 100%; box-sizing: border-box; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useRef } = React;

  const STORAGE_KEY = "roomer.listing.v1";

  function loadListing() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return window.LISTING;
  }

  function downloadDataFile(listing) {
    const js = "// Edited via /admin.html on " + new Date().toLocaleString() + "\n"
             + "window.LISTING = " + JSON.stringify(listing, null, 2) + ";\n";
    const blob = new Blob([js], { type: "text/javascript" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "data.js";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 0);
  }

  function resetToFile() {
    if (!confirm("Reset to the data.js shipped in the repo? Your in-browser edits will be lost.")) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }

  function AdminRoot() {
    const [listing, setListing] = useState(() => loadListing());
    const [savedAt, setSavedAt] = useState(null);
    const firstRender = useRef(true);

    // Auto-save to localStorage on every change
    useEffect(() => {
      if (firstRender.current) { firstRender.current = false; return; }
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(listing));
        setSavedAt(new Date());
      } catch (e) {
        console.error("Could not save to localStorage", e);
        alert(
          "Heads up — out of browser storage.\n\n" +
          "Photos are taking too much room. Either:\n" +
          "• Click 'Export data.js' now to save your work to disk, then refresh and reduce some photos, or\n" +
          "• Remove a few photos to free space."
        );
      }
    }, [listing]);

    const fmtSaved = savedAt ? "saved · " + savedAt.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) : "auto-save on";

    return (
      <>
        <div className="util-bar">
          <div style={{display:"flex", alignItems:"center", gap:14}}>
            <span className="serif" style={{fontSize:16, color:"#FBF7EE"}}>Roomer admin</span>
            <a href="./index.html" target="_blank">↗ Preview consumer view</a>
          </div>
          <div className="actions">
            <span className="saved">{fmtSaved}</span>
            <button className="ghost" onClick={resetToFile}>Reset</button>
            <button onClick={() => downloadDataFile(listing)}>Export data.js</button>
          </div>
        </div>
        <div className="admin-root">
          <AdminApp listing={listing} setListing={setListing}/>
        </div>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<AdminRoot/>);
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#F4EFE6"/>
<title>120 Summer Avenue, Reading MA</title>
<meta name="description" content="Open house companion — take the room-by-room tour on your phone."/>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="./data.js"></script>
<script type="text/babel" src="./consumer.jsx"></script>

<style>
  html, body {
    height: 100%;
    background: #F4EFE6;
    margin: 0;
    padding: 0;
    overscroll-behavior-y: none;
  }
  #root {
    min-height: 100vh;
    min-height: 100dvh;
    max-width: 520px;
    margin: 0 auto;
    background: #F4EFE6;
    /* respect iOS safe areas */
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    box-shadow: 0 0 80px rgba(27,25,22,0.04);
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="env,react">
  const { useState } = React;
  const STORAGE_KEY = "roomer.listing.v1";
  let listing = window.LISTING;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) listing = JSON.parse(raw);
  } catch (e) {}

  ReactDOM.createRoot(document.getElementById("root")).render(
    <ConsumerApp listing={listing}/>
  );
</script>

</body>
</html>
